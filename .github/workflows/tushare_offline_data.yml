name: Tushare Offline Data Fetch

# on:
  schedule:
    # 每天 UTC 时间 10:00 运行（北京时间 18:00，收盘后）
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      symbols:
        description: '要拉取的股票代码列表（逗号分隔），留空则拉取所有股票'
        required: false
        default: ''
      days:
        description: '拉取天数'
        required: false
        default: '365'
      force_update:
        description: '强制更新'
        type: boolean
        default: false

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install tushare pandas pyarrow python-dotenv
    
    - name: Create data directories
      run: |
        mkdir -p data/local_parquet_hist
        mkdir -p data
    
    - name: Fetch all stocks data
      if: github.event.inputs.symbols == ''
      env:
        TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      run: |
        echo "开始拉取所有A股股票数据..."
        echo "注意: 使用保守限流策略（每分钟45次/每天7500次）以避免API限制"
        python wyckoff_github/scripts/tushare_offline_fetcher.py --all --days ${{ github.event.inputs.days || 365 }} ${{ github.event.inputs.force_update == 'true' && '--force' || '' }}
    
    - name: Fetch specific stocks data
      if: github.event.inputs.symbols != ''
      env:
        TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      run: |
        echo "开始拉取指定股票数据: ${{ github.event.inputs.symbols }}"
        # 将逗号分隔的股票代码转换为空格分隔
        SYMBOLS=$(echo "${{ github.event.inputs.symbols }}" | tr ',' ' ')
        python wyckoff_github/scripts/tushare_offline_fetcher.py --symbols $SYMBOLS --days ${{ github.event.inputs.days || 365 }} ${{ github.event.inputs.force_update == 'true' && '--force' || '' }}
    
    - name: Show data summary
      env:
        TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      run: |
        echo "本地数据摘要:"
        python wyckoff_github/scripts/tushare_offline_fetcher.py --summary
    
    - name: Commit and push data
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 添加 Parquet 数据文件（如果存在）
        if ls data/local_parquet_hist/*.parquet 1> /dev/null 2>&1; then
          git add data/local_parquet_hist/*.parquet
          echo "已添加 Parquet 数据文件"
        else
          echo "未找到 Parquet 数据文件，跳过"
        fi
        
        # 添加限流状态文件（如果存在）
        if [ -f data/tushare_rate_limit_state.json ]; then
          git add data/tushare_rate_limit_state.json
          echo "已添加限流状态文件"
        else
          echo "限流状态文件不存在，跳过"
        fi
        
        # 如果有变更则提交
        if ! git diff --staged --quiet; then
          git commit -m "Update Tushare offline data [skip ci]"
          git push
          echo "✅ 数据已提交并推送"
        else
          echo "⚠️ 没有数据变更，跳过提交"
        fi
      continue-on-error: true
    
    - name: Upload data as artifact
      uses: actions/upload-artifact@v4
      with:
        name: tushare-offline-data
        path: data/local_parquet_hist/*.parquet
        retention-days: 7
